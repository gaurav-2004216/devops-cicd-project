apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-devops
  labels:
    app: flask-devops

spec:
  replicas: 2

  selector:
    matchLabels:
      app: flask-devops

  template:
    metadata:
      labels:
        app: flask-devops

    spec:
      containers:
      - name: flask-devops
        image: yourdockerhubusername/flask-devops:latest

        ports:
        - containerPort: 5000

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"

          limits:
            memory: "256Mi"
            cpu: "250m"

        livenessProbe:
          httpGet:
            path: /health
            port: 5000

          initialDelaySeconds: 10
          periodSeconds: 5
